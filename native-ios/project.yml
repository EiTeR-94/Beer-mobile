name: BeerNative
options:
  bundleIdPrefix: fr.eiter
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"  # Priority 5: basic iPad support (in addition to iPhone)
    INFOPLIST_FILE: BeerNative/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: fr.eiter.plexibeer
    MARKETING_VERSION: "4.4.20"
    CURRENT_PROJECT_VERSION: "215"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    DEVELOPMENT_TEAM: ""
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
targets:
  BeerNative:
    type: application
    platform: iOS
    sources:
      - path: BeerNative/Sources
      - path: BeerNative/Resources/Assets.xcassets
    # Theme 1: Tests/ dir added with example (ExampleModelTests.swift). To enable: add separate test target in XcodeGen config + scheme. CI note in workflow.
    entitlements:
      path: BeerNative/Resources/BeerNative.entitlements
    settings:
      base:
        PRODUCT_NAME: BeerQuest
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"

  # Priority 2: Test target wired (XcodeGen). Includes ExampleModelTests + can add mocks.
  # To build: xcodegen ; xcodebuild test -project BeerNative.xcodeproj -scheme BeerNativeTests -destination 'platform=iOS Simulator,name=iPhone 16'
  BeerNativeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BeerNative/Tests
    dependencies:
      - target: BeerNative
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BeerQuest.app/BeerQuest"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  BeerNative:
    build:
      targets:
        BeerNative: all
    run:
      config: Debug
    archive:
      config: Release
  # Test scheme for CI
  BeerNativeTests:
    build:
      targets:
        BeerNativeTests: all
    test:
      targets:
        - BeerNativeTests