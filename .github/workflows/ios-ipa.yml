# IPA native SwiftUI — build auto + artifact pour sync homelab (AltStore OTA)

name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "native-ios/**"
      - "scripts/build-native-ipa.sh"
      - "scripts/write-native-config.js"
      - "scripts/generate-altstore-source.js"
      - ".github/workflows/ios-ipa.yml"

permissions:
  contents: read

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    env:
      BEER_SERVER_URL: ${{ secrets.BEER_SERVER_URL }}
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier secret API
        run: |
          if [ -z "$BEER_SERVER_URL" ]; then
            echo "::error::Secret BEER_SERVER_URL manquant"
            exit 1
          fi

      - name: Bump build number (CI)
        run: |
          BUILD="${{ github.run_number }}"
          perl -i -pe "s/^(\s*CURRENT_PROJECT_VERSION:\s*).*/\${1}\"$BUILD\"/" native-ios/project.yml
          echo "Build number → $BUILD"

      - name: XcodeGen
        run: brew install xcodegen

      - name: Build IPA (xcodebuild)
        run: |
          chmod +x scripts/build-native-ipa.sh
          scripts/build-native-ipa.sh

      - name: Vérifier IPA AltStore
        run: |
          APP="$(find build/Payload -maxdepth 1 -name '*.app' -type d | head -1)"
          test -n "$APP"
          BIN="$(/usr/libexec/PlistBuddy -c 'Print CFBundleExecutable' "$APP/Info.plist")"
          test -f "$APP/$BIN"
          file "$APP/$BIN" | grep -E "Mach-O.*arm64"
          codesign -dv "$APP" 2>&1 | head -3
          ! find build/Payload -name "capacitor.config.json" | grep -q .
          ! find build/Payload -name "index.html" | grep -q .

      - name: Générer manifest AltStore
        run: node scripts/generate-altstore-source.js build/PlexiBeer.ipa "${{ github.run_number }}"

      - name: Publier artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PlexiBeer-ipa
          path: |
            build/PlexiBeer.ipa
            dist/altstore.json
          retention-days: 30
          if-no-files-found: error