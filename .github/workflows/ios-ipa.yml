# IPA native SwiftUI — build auto + Release GitHub (source AltStore HTTPS)

name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "native-ios/**"
      - "scripts/build-native-ipa.sh"
      - "scripts/write-native-config.js"
      - "scripts/generate-altstore-source.js"
      - ".github/workflows/ios-ipa.yml"

permissions:
  contents: write

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    env:
      BEER_SERVER_URL: https://eiter.freeboxos.fr/beer
      CI: "true"
      MOBILE_DIST_MODE: wan
      MOBILE_DIST_BASE_URL: https://eiter.freeboxos.fr/mobile/beer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump build number (CI)
        run: |
          BUILD="${{ github.run_number }}"
          perl -i -pe "s/^(\s*CURRENT_PROJECT_VERSION:\s*).*/\${1}\"$BUILD\"/" native-ios/project.yml
          echo "Build number → $BUILD"

      - name: XcodeGen
        run: brew install xcodegen

      - name: Build IPA (xcodebuild)
        run: |
          chmod +x scripts/build-native-ipa.sh
          scripts/build-native-ipa.sh

      - name: Vérifier IPA AltStore
        run: |
          APP="$(find build/Payload -maxdepth 1 -name '*.app' -type d | head -1)"
          test -n "$APP"
          BIN="$(/usr/libexec/PlistBuddy -c 'Print CFBundleExecutable' "$APP/Info.plist")"
          test -f "$APP/$BIN"
          file "$APP/$BIN" | grep -E "Mach-O.*arm64"
          ! find build/Payload -name "index.html" | grep -q .

      - name: Icône AltStore
        run: |
          mkdir -p altstore
          cp native-ios/BeerNative/Resources/Assets.xcassets/AppIcon.appiconset/icon-180.png altstore/icon-180.png

      - name: Manifest AltStore (miroir WAN Plexi)
        run: node scripts/generate-altstore-source.js build/PlexiBeer.ipa "${{ github.run_number }}"

      - name: Valider manifest AltStore (JSON)
        run: |
          node scripts/validate-altstore-json.js dist/altstore.json "$(stat -f%z build/PlexiBeer.ipa)"

      - name: Release GitHub (IPA uniquement — source AltStore = WAN Plexi)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-build-${{ github.run_number }}
          name: Beer Log iOS build ${{ github.run_number }}
          body: |
            Build automatique Beer Log iOS.

            Source AltStore (copier-coller dans AltStore, une seule URL) :
            https://eiter.freeboxos.fr/mobile/beer/altstore.json

            Ne pas utiliser GitHub releases/latest ni raw.githubusercontent.com (erreur AltStore 3840).
          files: |
            build/PlexiBeer.ipa
          make_latest: true