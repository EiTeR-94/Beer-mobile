# IPA native SwiftUI — build auto + Release GitHub (source AltStore HTTPS)

name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "native-ios/**"
      - "scripts/build-native-ipa.sh"
      - "scripts/write-native-config.js"
      - "scripts/generate-altstore-source.js"
      - ".github/workflows/ios-ipa.yml"

permissions:
  contents: write

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    env:
      BEER_SERVER_URL: https://eiter.freeboxos.fr/beer
      CI: "true"
      MOBILE_DIST_MODE: github

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump build number (CI)
        run: |
          BUILD="${{ github.run_number }}"
          perl -i -pe "s/^(\s*CURRENT_PROJECT_VERSION:\s*).*/\${1}\"$BUILD\"/" native-ios/project.yml
          echo "Build number → $BUILD"

      - name: XcodeGen
        run: brew install xcodegen

      - name: Build IPA (xcodebuild)
        run: |
          chmod +x scripts/build-native-ipa.sh
          scripts/build-native-ipa.sh

      - name: Vérifier IPA AltStore
        run: |
          APP="$(find build/Payload -maxdepth 1 -name '*.app' -type d | head -1)"
          test -n "$APP"
          BIN="$(/usr/libexec/PlistBuddy -c 'Print CFBundleExecutable' "$APP/Info.plist")"
          test -f "$APP/$BIN"
          file "$APP/$BIN" | grep -E "Mach-O.*arm64"
          ! find build/Payload -name "index.html" | grep -q .

      - name: Icône AltStore
        run: |
          mkdir -p altstore
          cp native-ios/BeerNative/Resources/Assets.xcassets/AppIcon.appiconset/icon-180.png altstore/icon-180.png

      - name: Manifest AltStore (GitHub HTTPS)
        run: node scripts/generate-altstore-source.js build/PlexiBeer.ipa "${{ github.run_number }}"

      - name: Copier manifest dans altstore/
        run: cp dist/altstore.json altstore/altstore.json

      - name: Valider manifest AltStore (JSON)
        run: |
          python3 -c "import json; json.load(open('dist/altstore.json'))"
          python3 -c "
          import json
          d=json.load(open('dist/altstore.json'))
          v=d['apps'][0]['versions'][0]
          assert v.get('downloadURL','').endswith('.ipa') or 'PlexiBeer.ipa' in v.get('downloadURL','')
          import os
          assert os.path.getsize('build/PlexiBeer.ipa') == int(v['size'])
          print('OK manifest', v['version'], v['buildVersion'], v['size'])
          "

      - name: Release GitHub (IPA + source)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-build-${{ github.run_number }}
          name: Beer Log iOS build ${{ github.run_number }}
          body: "Build automatique — AltStore source : releases/latest/download/altstore.json"
          files: |
            build/PlexiBeer.ipa
            dist/altstore.json
          make_latest: true

      - name: Commit altstore/ (URL fixe raw.githubusercontent.com)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore/
          git diff --staged --quiet || git commit -m "chore(ios): altstore manifest build ${{ github.run_number }}"
          git push