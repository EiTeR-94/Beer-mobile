# IPA native SwiftUI — xcodebuild (comme Xcode), pas Capacitor

name: Build iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    env:
      BEER_SERVER_URL: ${{ secrets.BEER_SERVER_URL }}
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier secret API
        run: |
          if [ -z "$BEER_SERVER_URL" ]; then
            echo "::error::Secret BEER_SERVER_URL manquant"
            exit 1
          fi

      - name: XcodeGen
        run: brew install xcodegen

      - name: Build IPA (xcodebuild)
        run: |
          chmod +x scripts/build-native-ipa.sh
          scripts/build-native-ipa.sh

      - name: Vérifier binaire Mach-O arm64
        run: |
          BIN="build/Payload/Plexi Beer.app/Plexi Beer"
          test -f "$BIN"
          file "$BIN" | grep -E "Mach-O.*arm64"
          # Pas de WebView Capacitor dans l'IPA
          ! find "build/Payload" -name "capacitor.config.json" | grep -q .
          ! find "build/Payload" -name "index.html" | grep -q .

      - name: Publier artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlexiBeer-ipa
          path: build/PlexiBeer.ipa
          retention-days: 30
          if-no-files-found: error