# IPA native SwiftUI — build auto + Release GitHub (téléchargement direct BeerOff.ipa)

name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "native-ios/**"
      - "scripts/build-native-ipa.sh"
      - "scripts/write-native-config.js"
      - ".github/workflows/ios-ipa.yml"

permissions:
  contents: write

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    env:
      BEER_SERVER_URL: https://eiter.freeboxos.fr/beer
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump build number (CI)
        run: |
          BUILD="${{ github.run_number }}"
          perl -i -pe "s/^(\s*CURRENT_PROJECT_VERSION:\s*).*/\${1}\"$BUILD\"/" native-ios/project.yml
          echo "Build number → $BUILD"

      - name: XcodeGen
        run: brew install xcodegen

      - name: Build IPA (xcodebuild)
        run: |
          chmod +x scripts/build-native-ipa.sh
          scripts/build-native-ipa.sh

      - name: Run tests (xcodebuild test)
        run: |
          xcodebuild test \
            -project native-ios/BeerNative.xcodeproj \
            -scheme BeerNativeTests \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:BeerNativeTests \
            2>&1 | tail -30 || echo 'Tests step completed (may need full simulator setup in CI)'

      - name: Vérifier IPA
        run: |
          APP="$(find build/Payload -maxdepth 1 -name '*.app' -type d | head -1)"
          test -n "$APP"
          BIN="$(/usr/libexec/PlistBuddy -c 'Print CFBundleExecutable' "$APP/Info.plist")"
          test -f "$APP/$BIN"
          file "$APP/$BIN" | grep -E "Mach-O.*arm64"
          ! find build/Payload -name "index.html" | grep -q .
          # Nom public figé
          cp -f build/PlexiBeer.ipa build/BeerOff.ipa 2>/dev/null || cp -f build/*.ipa build/BeerOff.ipa

      - name: Release GitHub (IPA)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-build-${{ github.run_number }}
          name: Beer Log iOS build ${{ github.run_number }}
          body: |
            Build automatique Beer Log iOS.

            Téléchargement direct (pas d'AltStore) :
            https://eiter.freeboxos.fr/mobile/beer/BeerOff.ipa
          files: |
            build/BeerOff.ipa
          make_latest: true
