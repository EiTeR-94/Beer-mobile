# Build IPA Plexi Beer — NON signée sur GitHub, re-signée par AltStore sur Windows

name: Build iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    env:
      BEER_SERVER_URL: ${{ secrets.BEER_SERVER_URL }}
      BEER_ALLOW_NAVIGATION: ${{ secrets.BEER_ALLOW_NAVIGATION }}
      FASTLANE_SKIP_UPDATE_CHECK: "true"
      FASTLANE_DISABLE_ANIMATION: "true"
      FASTLANE_OPT_OUT_USAGE: "true"
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier secret URL Beer
        run: |
          if [ -z "$BEER_SERVER_URL" ]; then
            echo "::error::Secret manquant : BEER_SERVER_URL (ex. https://ton-serveur/beer/)"
            exit 1
          fi

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Dépendances npm + iOS
        run: |
          npm ci 2>/dev/null || npm install
          node scripts/patch-capacitor-url.js
          npx cap add ios
          node scripts/patch-ios-plist.js
          node scripts/patch-ios-nosign.js
          npx cap sync ios
          node scripts/patch-ios-nosign.js
          cd ios/App && pod install

      - name: Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build IPA non signée
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Pas de connexion Apple — AltStore re-signera sur ton PC"
          bundle exec fastlane ios build_ipa --verbose || true
          if [ ! -f build/PlexiBeer.ipa ]; then
            ARCHIVE=$(find ~/Library/Developer/Xcode/Archives -name "*.xcarchive" -mmin -60 | head -1)
            if [ -n "$ARCHIVE" ] && [ -d "$ARCHIVE/Products/Applications" ]; then
              rm -rf build/Payload
              mkdir -p build/Payload
              cp -r "$ARCHIVE/Products/Applications/"*.app build/Payload/
              (cd build && zip -qr PlexiBeer.ipa Payload)
              echo "IPA empaquetée depuis l'archive Xcode"
            fi
          fi
          test -f build/PlexiBeer.ipa

      - name: Publier l'artifact IPA
        uses: actions/upload-artifact@v4
        with:
          name: PlexiBeer-ipa
          path: build/*.ipa
          retention-days: 30
          if-no-files-found: error