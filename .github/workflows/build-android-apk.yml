name: Build Android APK (PlexiBeer native)

on:
  workflow_dispatch:
  push:
    paths:
      - 'native-android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 'latest'
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace -x test
        working-directory: native-android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: plexibeer-debug-apk
          path: native-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
