# APK PlexiBeer — DÉSACTIVÉ pour la distribution.
#
# Source de vérité APK = build local sur le serveur plexi (.50) avec keystore dist :
#   /etc/plexi/secrets/plexi-beer-release.*
#   beer-mobile/scripts/build-release-apk.sh --publish
#
# Raison : pas de secrets GitHub pour le keystore ; une CI debug/autre key
# cassait les updates invités (« Application non installée »).
#
# IPA : toujours via ce repo + beer-mobile-sync (iOS).
# Doc : native-android/SIGNING.md

name: Build Android APK (PlexiBeer native)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "APK dist = serveur local uniquement — ne pas utiliser pour production"
        required: false
        default: "local-only"

permissions:
  contents: read

jobs:
  skip:
    runs-on: ubuntu-latest
    steps:
      - name: APK distribution is local-only
        run: |
          echo "============================================================"
          echo "APK BeerOff n'est plus buildée / publiée par GitHub Actions."
          echo ""
          echo "Sur le serveur plexi :"
          echo "  cd ~/beer-mobile && ./scripts/build-release-apk.sh --publish"
          echo ""
          echo "Voir native-android/SIGNING.md"
          echo "============================================================"
          exit 0
